name: SEO Bot — Daily Autopublishing

on:
  schedule:
    - cron: '0 9 * * *'   # 9:00 AM UTC every day
  workflow_dispatch:       # Allow manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run (no commits or pings)'
        required: false
        default: 'false'
        type: boolean

jobs:
  seo-bot:
    name: Run CLAUDE BOT SEO Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # Required to push state file changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run SEO Bot Pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: kennyoperator/satchiops
          CONTENT_DIR: content/posts
          STATE_PATH: content/bot_state.json
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/seo-bot.js

      # Pull latest changes committed by the bot via GitHub API
      - name: Sync repo with bot commits
        if: always()
        run: |
          git fetch origin main
          git reset --hard origin/main

      # Commit any local state changes the workflow may have written
      - name: Commit local state changes (fallback)
        if: always()
        run: |
          git config --global user.name "SatchiOps SEO Bot"
          git config --global user.email "seo-bot@satchiops.com"
          git add content/bot_state.json || true
          git diff --staged --quiet || git commit -m "chore(seo-bot): sync local state [skip ci]"
          git push || true
